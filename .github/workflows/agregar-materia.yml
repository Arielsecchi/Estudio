name: agregar-materia

on:
  repository_dispatch:
    types: [agregar-materia]
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug de la materia (ej: criminologia-2)'
        required: true
        type: string
      r2_prefix:
        description: 'Prefijo de R2 donde estan los archivos (vacio si corres manual con _entrada/ ya cargado)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  generar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolver parametros
        id: params
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "slug=${{ github.event.client_payload.slug }}" >> $GITHUB_OUTPUT
            echo "r2_prefix=${{ github.event.client_payload.r2_prefix }}" >> $GITHUB_OUTPUT
          else
            echo "slug=${{ inputs.slug }}" >> $GITHUB_OUTPUT
            echo "r2_prefix=${{ inputs.r2_prefix }}" >> $GITHUB_OUTPUT
          fi

      - name: Validar slug
        run: |
          SLUG="${{ steps.params.outputs.slug }}"
          if [ -z "$SLUG" ]; then echo "Slug vacio"; exit 1; fi
          if ! echo "$SLUG" | grep -qE '^[a-z0-9-]+$'; then
            echo "Slug invalido: $SLUG (solo minusculas, numeros y guiones)"; exit 1
          fi
          if [ -d "materias/$SLUG" ]; then
            echo "Ya existe materias/$SLUG/"; exit 1
          fi

      - name: Descargar archivos del Worker
        if: steps.params.outputs.r2_prefix != ''
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
          SLUG: ${{ steps.params.outputs.slug }}
          R2_PREFIX: ${{ steps.params.outputs.r2_prefix }}
        run: |
          python <<'PY'
          import os
          import urllib.parse
          import urllib.request
          import json
          from pathlib import Path

          base = os.environ['WORKER_URL'].rstrip('/')
          token = os.environ['INTERNAL_TOKEN']
          prefix = os.environ['R2_PREFIX']
          slug = os.environ['SLUG']
          destino = Path('_entrada') / slug
          destino.mkdir(parents=True, exist_ok=True)

          def req(url):
              r = urllib.request.Request(url, headers={'Authorization': f'Bearer {token}'})
              return urllib.request.urlopen(r, timeout=60)

          list_url = f'{base}/list?prefix={urllib.parse.quote(prefix)}'
          data = json.loads(req(list_url).read())
          files = data.get('files', [])
          if not files:
              raise SystemExit(f'No hay archivos en el prefijo {prefix}')

          for f in files:
              key = f['key']
              nombre = f['name']
              fpath = destino / nombre
              fpath.parent.mkdir(parents=True, exist_ok=True)
              file_url = f'{base}/file?key={urllib.parse.quote(key)}'
              with req(file_url) as resp, open(fpath, 'wb') as out:
                  while True:
                      chunk = resp.read(65536)
                      if not chunk:
                          break
                      out.write(chunk)
              print(f'  <- {nombre} ({f["size"]} bytes)')
          print(f'Descargados {len(files)} archivos a {destino}')
          PY

      - name: Verificar que hay archivos en _entrada
        env:
          SLUG: ${{ steps.params.outputs.slug }}
        run: |
          if [ ! -d "_entrada/$SLUG" ] || [ -z "$(ls -A _entrada/$SLUG 2>/dev/null)" ]; then
            echo "No hay archivos en _entrada/$SLUG. Si corres manualmente, primero commitea archivos ahi o usa repository_dispatch con r2_prefix."
            exit 1
          fi
          ls -la "_entrada/$SLUG"

      - name: Correr agregar_materia.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLUG: ${{ steps.params.outputs.slug }}
        run: python agregar_materia.py "$SLUG"

      - name: Regenerar index.html
        run: python build.py

      - name: Commit y push
        env:
          SLUG: ${{ steps.params.outputs.slug }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "materias/$SLUG" materias/_orden.txt index.html
          git commit -m "Agregar materia: $SLUG (via ${{ github.event_name }})"
          git push

      - name: Limpiar R2 via Worker
        if: steps.params.outputs.r2_prefix != '' && always()
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
          R2_PREFIX: ${{ steps.params.outputs.r2_prefix }}
        run: |
          python <<'PY'
          import os
          import urllib.parse
          import urllib.request

          base = os.environ['WORKER_URL'].rstrip('/')
          token = os.environ['INTERNAL_TOKEN']
          prefix = os.environ['R2_PREFIX']
          url = f'{base}/cleanup?prefix={urllib.parse.quote(prefix)}'
          r = urllib.request.Request(url, method='DELETE', headers={'Authorization': f'Bearer {token}'})
          resp = urllib.request.urlopen(r, timeout=30)
          print(resp.read().decode())
          PY
