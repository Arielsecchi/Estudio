<body class="locked">

<div class="auth-overlay" id="auth-overlay">
  <div class="auth-bg-deco" aria-hidden="true">
    <span></span><span></span><span></span>
  </div>
  <form class="auth-box" onsubmit="return tryAccess(event)" autocomplete="on">
    <div class="auth-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="currentColor" width="30" height="30">
        <path d="M12 3 1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 16.99l-5 2.73-5-2.73v-3.72L12 16l5-2.73v3.72z"/>
      </svg>
    </div>
    <div class="auth-titles">
      <h2>Guías de estudio</h2>
      <p class="auth-hint">Ingresá tus credenciales para continuar</p>
    </div>
    <div class="auth-field">
      <label for="auth-name">Nombre</label>
      <input type="text" id="auth-name" autocomplete="username" autocapitalize="words" autocorrect="off" spellcheck="false" required>
    </div>
    <div class="auth-field">
      <label for="auth-pass">Contraseña</label>
      <input type="password" id="auth-pass" autocomplete="current-password" required>
    </div>
    <button type="submit">
      <span>Ingresar</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
    <div class="auth-error" id="auth-error" role="alert"></div>
  </form>
</div>

<button class="menu-btn" id="menu-btn" onclick="toggleDrawer()" aria-label="Menú">☰</button>
<button class="theme-btn" id="theme-btn" onclick="toggleTheme()" aria-label="Tema">🌙</button>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

<aside class="drawer" id="drawer">
  <button class="drawer-close" onclick="closeDrawer()" aria-label="Cerrar">×</button>
  <div class="drawer-head">
    <h2>Guías UBA XXI</h2>
    <div class="hint">Elegí la materia que querés estudiar</div>
  </div>
  <ul class="drawer-list">
<!-- BUILD: DRAWER -->
  </ul>
  <div class="drawer-foot">
    Armado para Ariel · abril 2026

  </div>
</aside>

</footer>

</div>
