name = "estudio"
main = "worker.js"
compatibility_date = "2026-04-01"

# R2 bucket binding. Crear primero con: wrangler r2 bucket create uba-guias-entrada
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "uba-guias-entrada"

# Secrets (NO van aca, ponerlos con `wrangler secret put <nombre>`):
#   ACCESS_CODE              codigo que gatekeepea el form publico
#   GITHUB_TOKEN             PAT con permiso 'repo' (dispara repository_dispatch)
#   GITHUB_OWNER             owner del repo (ej: Arielsecchi)
#   GITHUB_REPO              nombre del repo (ej: Estudio)
#   INTERNAL_TOKEN           shared token Worker <-> GitHub Action (para /list, /file, /cleanup)
