name = "estudio"
main = "worker.js"
compatibility_date = "2026-04-01"

# R2 bucket binding. Crear primero con: wrangler r2 bucket create uba-guias-entrada
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "uba-guias-entrada"

# Secrets (NO van aca, ponerlos con `wrangler secret put <nombre>`):
#   ACCESS_CODE
#   GITHUB_TOKEN
#   GITHUB_OWNER
#   GITHUB_REPO
